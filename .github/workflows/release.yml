name: Release

on:
  push:
    tags:
      - '1.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          go build -buildmode=pie -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o scepclient-${{ matrix.suffix }} .

      - name: Generate checksum
        run: sha256sum scepclient-${{ matrix.suffix }} > scepclient-${{ matrix.suffix }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: scepclient-${{ matrix.suffix }}
          path: |
            scepclient-${{ matrix.suffix }}
            scepclient-${{ matrix.suffix }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            scepclient-*
